<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#edf7ef">
  <title>Flowl</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">Study pet tracker</p>
        <h1>Flowl</h1>
      </div>
      <div class="coin-pill" aria-label="所持コイン">
        <span>coin</span>
        <strong id="coinCount">0</strong>
      </div>
    </header>

    <section id="timerScreen" class="screen active" aria-label="タイマーと動物">
      <article class="timer panel">
        <div class="section-title">
          <p>Focus timer</p>
          <span id="timerStatus">待機中</span>
        </div>
        <h2 id="time">25:00</h2>
        <div class="timer-controls">
          <button id="startBtn">スタート</button>
          <button id="pauseBtn">一時停止</button>
          <button id="resetBtn">リセット</button>
        </div>
        <form id="timerRecordForm" class="timer-record">
          <label>
            タイマー科目
            <input id="timerSubjectInput" type="text" placeholder="英語、数学など" maxlength="24">
          </label>
          <button id="recordTimerBtn" type="submit">記録して終了</button>
        </form>
      </article>

      <article class="pet-panel panel">
        <div class="section-title">
          <p>Flowlet</p>
          <span id="petLevel">Lv. 1</span>
        </div>
        <div class="pet-stage" aria-label="育成中の動物">
          <div id="petActionProp" class="pet-action-prop" aria-hidden="true"></div>
          <div class="pet-shadow"></div>
          <div class="pet idle" id="pet" data-asset="flowl-owl">
            <!-- SVGの各パーツにclassを付けて、CSSとJavaScriptから動かしやすくしています。 -->
            <svg class="owl-svg" viewBox="0 0 160 170" role="img" aria-label="小さなフクロウのFlowlet">
              <g class="owl-root">
                <path class="owl-ear left" d="M50 38 C45 24 53 16 67 29 L61 47 Z"></path>
                <path class="owl-ear right" d="M110 38 C115 24 107 16 93 29 L99 47 Z"></path>
                <path class="owl-body" d="M80 18 C115 18 138 48 138 86 C138 127 114 154 80 154 C46 154 22 127 22 86 C22 48 45 18 80 18 Z"></path>
                <path class="pet-wing left" d="M42 74 C25 84 22 111 32 130 C45 119 50 99 50 82 Z"></path>
                <path class="pet-wing right" d="M118 74 C135 84 138 111 128 130 C115 119 110 99 110 82 Z"></path>
                <path class="owl-belly" d="M80 60 C104 60 120 81 120 107 C120 135 103 148 80 148 C57 148 40 135 40 107 C40 81 56 60 80 60 Z"></path>
                <g class="owl-head">
                  <circle class="owl-cheek left" cx="57" cy="92" r="8"></circle>
                  <circle class="owl-cheek right" cx="103" cy="92" r="8"></circle>
                  <circle class="eye left" cx="61" cy="79" r="5.5"></circle>
                  <circle class="eye right" cx="99" cy="79" r="5.5"></circle>
                  <path class="owl-brow left" d="M52 67 L68 72"></path>
                  <path class="owl-brow right" d="M108 67 L92 72"></path>
                  <path class="owl-beak" d="M80 91 L70 79 L90 79 Z"></path>
                </g>
                <path class="owl-foot left" d="M54 149 C47 149 43 153 43 159 C50 157 56 157 63 159 C64 153 61 149 54 149 Z"></path>
                <path class="owl-foot right" d="M106 149 C113 149 117 153 117 159 C110 157 104 157 97 159 C96 153 99 149 106 149 Z"></path>
              </g>
            </svg>
          </div>
        </div>
        <div class="stats">
          <label>
            <span>まんぷく</span>
            <meter id="hungerMeter" min="0" max="100" value="60"></meter>
          </label>
          <label>
            <span>ごきげん</span>
            <meter id="happyMeter" min="0" max="100" value="60"></meter>
          </label>
          <label>
            <span>エネルギー</span>
            <meter id="energyMeter" min="0" max="100" value="60"></meter>
          </label>
        </div>
      </article>
    </section>

    <section id="logScreen" class="screen" aria-label="記録ログ">
      <article class="panel record-panel">
        <div class="section-title">
          <p>Study log</p>
          <span id="todayTotal">今日 0分</span>
        </div>
        <form id="studyForm" class="study-form">
          <label>
            科目
            <input id="subjectInput" type="text" placeholder="英語、数学など" maxlength="24">
          </label>
          <label>
            分
            <input id="minutesInput" type="number" min="1" max="600" value="25">
          </label>
          <button type="submit">記録</button>
        </form>
      </article>

      <article class="panel history-panel">
        <div class="section-title">
          <p>Recent sessions</p>
          <span id="totalStudy">累計 0分</span>
        </div>
        <ul id="historyList" class="history-list"></ul>
      </article>

      <article class="panel weekly-panel">
        <div class="section-title">
          <p>Weekly graph</p>
          <span id="weekTotal">週合計 0分</span>
        </div>
        <div class="week-controls">
          <button id="prevWeekBtn" type="button">前の週</button>
          <strong id="weekLabel">今週</strong>
          <button id="nextWeekBtn" type="button">次の週</button>
        </div>
        <div id="weekChart" class="week-chart" aria-label="一週間の学習時間グラフ"></div>
        <p id="weekCompare" class="week-compare">前週との差 0分</p>
      </article>
    </section>

    <section id="careScreen" class="screen" aria-label="動物のお世話">
      <article class="pet-panel panel">
        <div class="section-title">
          <p>Care</p>
          <span id="petCareLevel">Lv. 1</span>
        </div>
        <div class="pet-stage" aria-label="お世話中の動物">
          <div id="petCareActionProp" class="pet-action-prop" aria-hidden="true"></div>
          <div class="pet-shadow"></div>
          <div class="pet idle" id="petCare" data-asset="flowl-owl">
            <!-- タイマー画面と同じ構造にして、同じclass切り替えで同期できます。 -->
            <svg class="owl-svg" viewBox="0 0 160 170" role="img" aria-label="小さなフクロウのFlowlet">
              <g class="owl-root">
                <path class="owl-ear left" d="M50 38 C45 24 53 16 67 29 L61 47 Z"></path>
                <path class="owl-ear right" d="M110 38 C115 24 107 16 93 29 L99 47 Z"></path>
                <path class="owl-body" d="M80 18 C115 18 138 48 138 86 C138 127 114 154 80 154 C46 154 22 127 22 86 C22 48 45 18 80 18 Z"></path>
                <path class="pet-wing left" d="M42 74 C25 84 22 111 32 130 C45 119 50 99 50 82 Z"></path>
                <path class="pet-wing right" d="M118 74 C135 84 138 111 128 130 C115 119 110 99 110 82 Z"></path>
                <path class="owl-belly" d="M80 60 C104 60 120 81 120 107 C120 135 103 148 80 148 C57 148 40 135 40 107 C40 81 56 60 80 60 Z"></path>
                <g class="owl-head">
                  <circle class="owl-cheek left" cx="57" cy="92" r="8"></circle>
                  <circle class="owl-cheek right" cx="103" cy="92" r="8"></circle>
                  <circle class="eye left" cx="61" cy="79" r="5.5"></circle>
                  <circle class="eye right" cx="99" cy="79" r="5.5"></circle>
                  <path class="owl-brow left" d="M52 67 L68 72"></path>
                  <path class="owl-brow right" d="M108 67 L92 72"></path>
                  <path class="owl-beak" d="M80 91 L70 79 L90 79 Z"></path>
                </g>
                <path class="owl-foot left" d="M54 149 C47 149 43 153 43 159 C50 157 56 157 63 159 C64 153 61 149 54 149 Z"></path>
                <path class="owl-foot right" d="M106 149 C113 149 117 153 117 159 C110 157 104 157 97 159 C96 153 99 149 106 149 Z"></path>
              </g>
            </svg>
          </div>
        </div>
        <div class="stats">
          <label>
            <span>まんぷく</span>
            <meter id="hungerCareMeter" min="0" max="100" value="60"></meter>
          </label>
          <label>
            <span>ごきげん</span>
            <meter id="happyCareMeter" min="0" max="100" value="60"></meter>
          </label>
          <label>
            <span>エネルギー</span>
            <meter id="energyCareMeter" min="0" max="100" value="60"></meter>
          </label>
        </div>
        <div class="care-actions">
          <button class="care-btn" data-action="feed">
            <span class="mini-icon bowl-icon" aria-hidden="true"></span>
            ごはん 8
          </button>
          <button class="care-btn" data-action="play">
            <span class="mini-icon ball-icon" aria-hidden="true"></span>
            あそぶ 6
          </button>
          <button class="care-btn" data-action="rest">
            <span class="mini-icon cushion-icon" aria-hidden="true"></span>
            休む 5
          </button>
        </div>
        <div class="motion-lab">
          <div class="section-title compact">
            <p>Motion</p>
            <span id="motionLabel">待機</span>
          </div>
          <div class="motion-controls" aria-label="フクロウのモーション切り替え">
            <button class="motion-btn active" type="button" data-motion="idle">待機</button>
            <button class="motion-btn" type="button" data-motion="headTilt">首かしげ</button>
            <button class="motion-btn" type="button" data-motion="eat">食べる</button>
            <button class="motion-btn" type="button" data-motion="happy">喜ぶ</button>
            <button class="motion-btn" type="button" data-motion="angry">怒る</button>
            <button class="motion-btn" type="button" data-motion="sad">悲しい</button>
            <button class="motion-btn" type="button" data-motion="fun">楽しい</button>
            <button class="motion-btn" type="button" data-motion="sleep">寝る</button>
          </div>
        </div>
        <div class="inventory">
          <div class="section-title compact">
            <p>Items</p>
            <span>もちもの</span>
          </div>
          <div id="inventoryList" class="item-list"></div>
        </div>
      </article>
    </section>

    <section id="shopScreen" class="screen" aria-label="ショップ">
      <article class="panel shop-panel">
        <div class="section-title">
          <p>Pet shop</p>
          <span>1分 = 1 coin</span>
        </div>
        <div id="shopList" class="shop-list"></div>
      </article>
    </section>
  </main>

  <nav class="bottom-nav" aria-label="画面切り替え">
    <button class="nav-btn active" type="button" data-screen="timerScreen">
      <span>Timer</span>
      タイマー
    </button>
    <button class="nav-btn" type="button" data-screen="logScreen">
      <span>Log</span>
      記録
    </button>
    <button class="nav-btn" type="button" data-screen="careScreen">
      <span>Care</span>
      お世話
    </button>
    <button class="nav-btn" type="button" data-screen="shopScreen">
      <span>Shop</span>
      ショップ
    </button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
